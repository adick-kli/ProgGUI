[APP]
version = 1.0.0
app_name = ProgGUI
auto_save = true
show_startup_message = true

[THEME]
current_theme = dark
auto_theme = false

[LANGUAGE]
current_language = deutsch
auto_detect = false

[WINDOW]
width = 1024
height = 768
x_pos = 431
y_pos = 71
maximized = false

[DEVICES]
auto_detect = false
default_device = Atmel-ICE
timeout_seconds = 30

[PROGRAMMER]
verify_after_program = true
erase_before_program = false
backup_before_program = true
lock_after_program = false

[BOOTLOADER]
default_type = sam-ba
verify_after_program = true
lock_after_program = false
backup_before_program = true

[PATHS]
firmware_dir = ./firmware
backup_dir = ./backups
export_dir = ./export

[LOGGING]
log_level = info
log_file = ./logs/proggui.log
keep_logs = true
max_log_size_mb = 10

